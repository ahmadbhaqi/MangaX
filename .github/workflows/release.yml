name: Build and Release APK

on:
  push:
    tags:
      - 'v*' # Trigger saat nge-push tag seperti v1.0.0
  workflow_dispatch: # Memungkinkan kamu trigger build secara manual dari tab Actions di GitHub

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Android modern membutuhkan Java 17

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Android APK (Debug/Unsigned)
        run: |
          cd android
          ./gradlew assembleDebug
        # Kita menggunakan assembleDebug agar APK otomatis di-sign dengan debug key 
        # dan bisa langsung di-install di HP untuk testing.

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk MangaX.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: MangaX.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload Artifact (For Manual Trigger)
        uses: actions/upload-artifact@v4
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        with:
          name: MangaX-APK
          path: MangaX.apk
